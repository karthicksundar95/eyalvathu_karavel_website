<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5c5044"/>
      <stop offset="50%" style="stop-color:#6b7d5e"/>
      <stop offset="100%" style="stop-color:#8b7355"/>
    </linearGradient>
    <filter id="n" x="0" y="0">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="4" stitchTiles="stitch" result="t"/>
      <feColorMatrix in="t" type="saturate" values="0.2" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="overlay"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#g)" filter="url(#n)"/>
</svg>
